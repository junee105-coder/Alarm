<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 알람</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117; color: #e8e9f0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 24px 16px; display: flex; flex-direction: column; align-items: center;
}
h1 { font-size: 1.3rem; font-weight: 800; color: #fff; text-align: center; margin-bottom: 4px; }
.sub { font-size: 0.78rem; color: #6b7280; text-align: center; margin-bottom: 16px; }
.now { font-size: 1.6rem; font-weight: 800; color: #a78bfa; text-align: center; margin-bottom: 20px; }
.card { background: #1c1f2e; border: 1px solid #2d3148; border-radius: 14px; padding: 16px; width: 100%; max-width: 480px; margin-bottom: 14px; }
.lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 10px; }
.input-row { display: flex; gap: 8px; align-items: center; }
input[type=time] { background: #0d0f18; border: 1px solid #2d3148; border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.95rem; padding: 10px 12px; outline: none; width: 130px; }
input[type=text] { background: #0d0f18; border: 1px solid #2d3148; border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.95rem; padding: 10px 12px; outline: none; flex: 1; }
input:focus { border-color: #7c6fff; }
input::placeholder { color: #4b5563; }
.add-btn { padding: 10px 16px; border-radius: 8px; border: none; background: #7c6fff; color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
#list { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.item { background: #1c1f2e; border: 1px solid #2d3148; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.item-time { font-size: 1rem; font-weight: 800; color: #a78bfa; min-width: 52px; }
.item-task { flex: 1; font-size: 0.95rem; }
.del-btn { background: none; border: none; color: #4b5563; font-size: 1rem; cursor: pointer; padding: 4px 6px; }
.empty { color: #4b5563; font-size: 0.85rem; text-align: center; padding: 20px; }
#popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99; justify-content: center; align-items: center; }
#popup.show { display: flex; }
.popup-box { background: #1c1f2e; border: 2px solid #a78bfa; border-radius: 20px; padding: 32px 24px; text-align: center; width: 85%; max-width: 300px; }
.popup-icon { font-size: 2.8rem; margin-bottom: 10px; }
.popup-time { font-size: 0.8rem; color: #a78bfa; font-weight: 700; margin-bottom: 8px; }
.popup-msg { font-size: 1.15rem; font-weight: 800; color: #fff; margin-bottom: 22px; line-height: 1.4; }
.ok-btn { padding: 12px 32px; border-radius: 10px; border: none; background: #7c6fff; color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h1>⏰ 일정 알람</h1>
<p class="sub">시간이 되면 알려드려요</p>
<div class="now" id="nowTime">--:--:--</div>
<div class="card">
  <div class="lbl">일정 추가</div>
  <div class="input-row">
    <input type="time" id="ti">
    <input type="text" id="tx" placeholder="할 일 입력">
    <button class="add-btn" onclick="add()">추가</button>
  </div>
</div>
<div id="list"></div>
<div id="popup">
  <div class="popup-box">
    <div class="popup-icon">🔔</div>
    <div class="popup-time" id="pt"></div>
    <div class="popup-msg" id="pm"></div>
    <button class="ok-btn" onclick="document.getElementById('popup').className=''">확인</button>
  </div>
</div>
<script>
var items=[], fired={};
function add(){
  var t=document.getElementById('ti').value;
  var tx=document.getElementById('tx').value.trim();
  if(!t){alert('시간을 선택해주세요.');return;}
  if(!tx){alert('할 일을 입력해주세요.');return;}
  items.push({id:Date.now(),time:t,task:tx});
  document.getElementById('tx').value='';
  render();
}
function del(id){ items=items.filter(function(x){return x.id!==id;}); render(); }
function render(){
  var el=document.getElementById('list');
  if(!items.length){el.innerHTML='<div class="empty">일정을 추가해보세요 👆</div>';return;}
  var s=items.slice().sort(function(a,b){return a.time>b.time?1:-1;});
  el.innerHTML=s.map(function(it){
    return '<div class="item"><div class="item-time">'+it.time+'</div><div class="item-task">'+it.task+'</div><button class="del-btn" onclick="del('+it.id+')">✕</button></div>';
  }).join('');
}
function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    for(var i=0;i<3;i++){(function(i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      var st=ctx.currentTime+i*0.45;
      g.gain.setValueAtTime(0.5,st);
      g.gain.exponentialRampToValueAtTime(0.001,st+0.35);
      o.start(st);o.stop(st+0.35);
    })(i);}
  }catch(e){}
}
function fireAlarm(it){
  document.getElementById('pt').textContent=it.time;
  document.getElementById('pm').textContent=it.task;
  document.getElementById('popup').className='show';
  beep();
}
function tick(){
  var now=new Date();
  var hh=String(now.getHours()).padStart(2,'0');
  var mm=String(now.getMinutes()).padStart(2,'0');
  var ss=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('nowTime').textContent=hh+':'+mm+':'+ss;
  if(parseInt(ss)<5){
    var key=hh+':'+mm;
    items.forEach(function(it){
      var fk=it.id+'_'+key;
      if(it.time===key&&!fired[fk]){fired[fk]=true;fireAlarm(it);}
    });
  }
}
render();
setInterval(tick,1000);
tick();
</script>
</body>
</html>
